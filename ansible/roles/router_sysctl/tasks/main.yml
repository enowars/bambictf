---
- name: Load nf_conntrack on boot
  copy:
    content: "nf_conntrack\n"
    dest: "/etc/modules-load.d/nf_conntrack.conf"
    mode: "0644"

# hashsize is a module parameter, not a sysctl, so it can only be set at module load time
- name: Set the conntrack hashsize at module load
  copy:
    content: "options nf_conntrack hashsize=1310720\n"
    dest: "/etc/modprobe.d/nf_conntrack.conf"
    mode: "0644"

# the net.netfilter.* keys below only exist once the module is loaded
- name: Load nf_conntrack
  modprobe:
    name: nf_conntrack
    state: present

- name: Read the current conntrack hashsize
  command: cat /sys/module/nf_conntrack/parameters/hashsize
  register: router_sysctl_hashsize
  changed_when: false

- name: Apply the conntrack hashsize to the running module
  shell: "echo 1310720 > /sys/module/nf_conntrack/parameters/hashsize"
  when: router_sysctl_hashsize.stdout | trim != "1310720"

- name: Tune the kernel for routing the game network
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-bambirouter.conf
    sysctl_set: true
  loop:
    - { name: net.ipv4.ip_forward, value: "1" }

    # conntrack table sizing, hashsize is 1/4 of max
    - { name: net.netfilter.nf_conntrack_max, value: "5242880" }

    # aggressive eviction, A/D traffic is mostly short-lived flows and the
    # default established timeout of 5 days fills the table long before then
    - { name: net.netfilter.nf_conntrack_tcp_timeout_established, value: "600" }
    - { name: net.netfilter.nf_conntrack_tcp_timeout_time_wait, value: "30" }
    - { name: net.netfilter.nf_conntrack_tcp_timeout_close_wait, value: "15" }
    - { name: net.netfilter.nf_conntrack_tcp_timeout_fin_wait, value: "30" }
    - { name: net.netfilter.nf_conntrack_tcp_timeout_last_ack, value: "15" }

    # raise the socket buffer ceiling only, rmem_default stays at the kernel default
    - { name: net.core.rmem_max, value: "209715200" }

    # packet ingress under storms
    - { name: net.core.netdev_max_backlog, value: "250000" }
    - { name: net.core.netdev_budget, value: "600" }
    - { name: net.core.netdev_budget_usecs, value: "8000" }

    # accept/syn queues, only relevant for connections terminated on the router itself
    - { name: net.core.somaxconn, value: "65535" }
    - { name: net.ipv4.tcp_max_syn_backlog, value: "65535" }
